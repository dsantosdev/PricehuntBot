services:
  - type: web
    name: pricehuntbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false           # você preenche no painel do Render
      - key: DATABASE_URL
        fromDatabase:
          name: pricehuntbot-db
          property: connectionString
    healthCheckPath: /health

databases:
  - name: pricehuntbot-db
    plan: free